# .github/workflows/release.yml
# 推送 v* tag 时自动构建 Windows 安装包，发布到 GitHub Releases
# 并生成 latest.json 供 Tauri Updater 自动更新使用

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    name: Build (Windows x86_64)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: windows-x86_64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            windows-x86_64-cargo-

      - name: Install frontend dependencies
        run: npm ci

      # ── 构建前检查：三处版本号必须一致 ─────────────────────────────────
      - name: Verify version sync
        shell: bash
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          TAURI_VER=$(node -p "require('./src-tauri/tauri.conf.json').version")
          CARGO_VER=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          TAG_VER="${GITHUB_REF_NAME#v}"
          echo "package.json: $PKG_VER | tauri.conf.json: $TAURI_VER | Cargo.toml: $CARGO_VER | tag: $TAG_VER"
          if [ "$PKG_VER" != "$TAURI_VER" ] || [ "$PKG_VER" != "$CARGO_VER" ] || [ "$PKG_VER" != "$TAG_VER" ]; then
            echo "ERROR: Version mismatch — all three files and the git tag must agree"
            exit 1
          fi

      # ── 构建前检查：TypeScript 类型检查 ────────────────────────────────
      - name: TypeScript type check
        run: npx tsc --noEmit

      # ── 构建前检查：Rust lint ───────────────────────────────────────────
      - name: Rust lint
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      # ── 依赖安全扫描 ────────────────────────────────────────────────────
      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: false

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # 若签名私钥无密码，此 secret 设为空字符串即可；有密码则填入密码
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "QuickTranslate ${{ github.ref_name }}"
          releaseBody: |
            ## QuickTranslate ${{ github.ref_name }}

            ### 下载
            - **Windows**：下载 `.msi` 安装包

            ### 更新内容
            请查看 [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/changelog/CHANGELOG_AUTO.md)
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc

  publish-update-manifest:
    needs: build-windows
    runs-on: ubuntu-latest
    name: Publish update manifest (latest.json)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"

          # ── 等待 Release assets 可用（轮询，最多等待 10 分钟）──────────
          # Tauri 2 Windows MSI 签名文件命名：*.msi.sig（不是 *.msi.zip.sig）
          MSI_SIG_URL=""
          MSI_URL=""
          for i in $(seq 1 30); do
            MSI_SIG_URL=$(gh release view "$TAG" --json assets \
              --jq '.assets[] | select(.name | endswith(".msi.sig")) | .browser_download_url' \
              --repo "${{ github.repository }}" 2>/dev/null || true)
            MSI_URL=$(gh release view "$TAG" --json assets \
              --jq '.assets[] | select(.name | endswith(".msi") and (.name | endswith(".msi.sig") | not)) | .browser_download_url' \
              --repo "${{ github.repository }}" 2>/dev/null || true)
            if [ -n "$MSI_SIG_URL" ] && [ -n "$MSI_URL" ]; then
              echo "Assets found after $i attempt(s)"
              break
            fi
            echo "Waiting for assets... attempt $i/30 (sleeping 20s)"
            sleep 20
          done

          # ── 内容验证：URL 或签名为空则立即失败，不发布损坏的 manifest ──
          if [ -z "$MSI_URL" ]; then
            echo "ERROR: MSI download URL not found after polling — check asset names in the release"
            gh release view "$TAG" --json assets --jq '.assets[].name' --repo "${{ github.repository }}"
            exit 1
          fi
          if [ -z "$MSI_SIG_URL" ]; then
            echo "ERROR: MSI signature URL not found"
            exit 1
          fi

          # ── 读取签名内容（.sig 文件是纯文本 base64 字符串）──────────────
          MSI_SIG=$(curl -sL -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/octet-stream" "$MSI_SIG_URL")

          if [ -z "$MSI_SIG" ]; then
            echo "ERROR: MSI signature content is empty"
            exit 1
          fi

          # ── 生成 latest.json（Tauri Updater 标准格式）───────────────────
          cat > latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "https://github.com/${{ github.repository }}/releases/tag/${TAG}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "url": "${MSI_URL}",
                "signature": "${MSI_SIG}"
              }
            }
          }
          EOF

          echo "Generated latest.json:"
          cat latest.json

          # ── 上传到 Release ───────────────────────────────────────────────
          gh release upload "$TAG" latest.json \
            --clobber --repo "${{ github.repository }}"
